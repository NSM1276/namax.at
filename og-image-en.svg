<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="g" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <circle cx="1" cy="1" r=".6" fill="#0E0E0C" opacity=".035"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#C8900A" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#C8900A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#F4F1EB"/>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left wing -->
  <text x="80" y="100" font-family="-apple-system,Helvetica Neue,Arial,sans-serif"
    font-size="13" letter-spacing="3" fill="#6F6B5F">VIENNA · 2006</text>
  <text x="80" y="555" font-family="-apple-system,Helvetica Neue,Arial,sans-serif"
    font-size="13" letter-spacing="3" fill="#6F6B5F">FIXED PRICE</text>

  <!-- Right wing -->
  <text x="1120" y="100" text-anchor="end"
    font-family="-apple-system,Helvetica Neue,Arial,sans-serif"
    font-size="13" letter-spacing="3" fill="#6F6B5F">100 / 100</text>
  <text x="1120" y="555" text-anchor="end"
    font-family="-apple-system,Helvetica Neue,Arial,sans-serif"
    font-size="13" letter-spacing="3" fill="#6F6B5F">HANDSHAKE</text>

  <!-- Brand mark + name -->
  <rect x="555" y="138" width="50" height="50" rx="9" fill="#0E0E0C"/>
  <text x="580" y="174" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif" font-style="italic"
    font-size="32" fill="#F4F1EB">n</text>
  <text x="618" y="172"
    font-family="-apple-system,Helvetica Neue,Arial,sans-serif"
    font-weight="600" font-size="26" letter-spacing="-0.4" fill="#0E0E0C">namax</text>
  <text x="715" y="172"
    font-family="-apple-system,Helvetica Neue,Arial,sans-serif"
    font-size="26" fill="#8B6512">.at</text>

  <!-- €799 -->
  <text x="600" y="350" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif" font-style="italic"
    font-size="180" letter-spacing="-4" fill="#0E0E0C">€799.</text>

  <!-- Subline -->
  <text x="600" y="420" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif" font-style="italic"
    font-size="46" letter-spacing="-1" fill="#8B6512">live in 7 days.</text>

  <line x1="500" y1="460" x2="700" y2="460" stroke="#0E0E0C" stroke-opacity=".2" stroke-width="1"/>

  <text x="600" y="495" text-anchor="middle"
    font-family="-apple-system,Helvetica Neue,Arial,sans-serif"
    font-size="16" letter-spacing="3" fill="#0E0E0C" opacity=".75">PROFESSIONAL BUSINESS WEBSITE</text>
</svg>

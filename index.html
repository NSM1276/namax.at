<style>
:root{
  --bone:#F4F1EB;
  --bone-2:#EAE5DB;
  --bone-3:#DCD5C6;
  --ink:#0E0E0C;
  --ink-2:#1B1B17;
  --ink-3:#3A3933;
  --mute:#6F6B5F;
  --mute-2:#8A8576;
  --line:rgba(14,14,12,.10);
  --line-2:rgba(14,14,12,.18);
  --ochre:oklch(0.72 0.14 70);
  --ochre-soft:oklch(0.85 0.08 70);
  --ochre-deep:oklch(0.55 0.13 60);
  --maxw:1320px;
  --gutter:clamp(20px,4vw,56px);
  --ease:cubic-bezier(.22,.61,.36,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bone);color:var(--ink);
  font-family:"Inter Tight","Inter",ui-sans-serif,system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif;
  font-feature-settings:"ss01","ss02","cv11";
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-size:16px;line-height:1.5}
body{overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
::selection{background:var(--ink);color:var(--bone)}
.serif{font-family:"Instrument Serif","Times New Roman",serif;font-weight:400;font-style:italic;letter-spacing:-.005em}
.container{max-width:var(--maxw);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}

/* Nav */
.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  background:color-mix(in oklab, var(--bone) 78%, transparent);
  border-bottom:.5px solid var(--line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em}
.brand-mark{width:28px;height:28px;border-radius:7px;background:var(--ink);
  display:grid;place-items:center;color:var(--bone);font-family:"Instrument Serif",serif;
  font-style:italic;font-size:18px;line-height:1}
.brand-name{font-size:15px}
.brand-name b{font-weight:600}
.brand-name .dot{color:var(--ochre-deep)}
.nav-links{display:flex;gap:28px;font-size:13.5px;color:var(--ink-3)}
.nav-links a{position:relative;padding:6px 0}
.nav-links a:hover{color:var(--ink)}
.nav-cta{display:flex;align-items:center;gap:14px}
.lang{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--mute);letter-spacing:.06em;
  background:rgba(14,14,12,.04);border:1px solid var(--line);border-radius:999px;padding:4px 8px}
.lang-btn{padding:2px 6px;border-radius:999px;color:var(--mute);font-weight:500;letter-spacing:.06em;
  transition:color .2s,background .2s}
.lang-btn:hover{color:var(--ink)}
.lang-btn.on{color:var(--bone);background:var(--ink)}
.lang-sep{color:var(--line-2)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:10px;padding:13px 20px;border-radius:999px;
  font-size:14px;font-weight:500;letter-spacing:-.005em;
  transition:transform .25s var(--ease),background .2s,color .2s,border-color .2s}
.btn-primary{background:var(--ink);color:var(--bone)}
.btn-primary:hover{background:var(--ink-2);transform:translateY(-1px)}
.btn-primary .arr{transition:transform .35s var(--ease-out)}
.btn-primary:hover .arr{transform:translateX(4px)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line-2)}
.btn-ghost:hover{border-color:var(--ink);background:var(--ink);color:var(--bone)}
.btn-pill{padding:9px 14px;font-size:12.5px}
.kicker{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--mute);font-weight:500}
.kicker .dot{width:5px;height:5px;border-radius:50%;background:var(--ochre);box-shadow:0 0 0 4px color-mix(in oklab,var(--ochre) 25%,transparent)}

/* Hero */
.hero{padding:clamp(56px,9vw,120px) 0 clamp(40px,6vw,80px);position:relative}
.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(28px,5vw,80px);align-items:end}
.hero h1{font-family:"Instrument Serif",serif;font-weight:400;
  font-size:clamp(44px,7vw,108px);line-height:.96;letter-spacing:-.025em;margin:0 0 18px}
.hero h1 .it{font-style:italic;color:var(--ink-3)}
.hero h1 .ochre{color:var(--ochre-deep);font-style:italic}
.hero-lede{max-width:520px;font-size:clamp(15px,1.3vw,18px);color:var(--ink-3);line-height:1.55;margin:18px 0 28px}
.hero-meta{display:flex;flex-wrap:wrap;gap:24px 36px;padding-top:24px;border-top:1px solid var(--line);margin-top:36px}
.hero-meta div{display:flex;flex-direction:column;gap:4px}
.hero-meta .k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
.hero-meta .v{font-size:15px;color:var(--ink);font-weight:500}
.hero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}

/* Duo card */
.duo{position:relative;border-radius:18px;background:linear-gradient(180deg,#1a1915 0%,#0e0e0c 100%);
  color:var(--bone);padding:28px;overflow:hidden;
  box-shadow:0 24px 60px -28px rgba(0,0,0,.45),0 1px 0 rgba(255,255,255,.04) inset}
.duo-tag{display:flex;align-items:center;gap:10px;font-size:11.5px;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.55)}
.duo-tag .pulse{width:6px;height:6px;border-radius:50%;background:var(--ochre);
  box-shadow:0 0 0 0 color-mix(in oklab,var(--ochre) 70%,transparent);
  animation:pulse 2.4s var(--ease) infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in oklab,var(--ochre) 60%,transparent)}
  70%{box-shadow:0 0 0 12px transparent}100%{box-shadow:0 0 0 0 transparent}}
.duo-people{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}
.person{position:relative}
.avatar{aspect-ratio:4/5;border-radius:12px;overflow:hidden;position:relative;
  background:#222 linear-gradient(135deg,#2a2924 0%,#181715 100%)}
.avatar::before,.avatar::after{content:"";position:absolute;inset:0}
.avatar::before{background:repeating-linear-gradient(135deg,rgba(255,255,255,.04) 0 8px,transparent 8px 16px)}
.avatar::after{background:radial-gradient(60% 60% at 50% 35%,rgba(212,170,90,.18),transparent 70%)}
.avatar .glyph{position:absolute;inset:0;display:grid;place-items:center;
  font-family:"Instrument Serif",serif;font-style:italic;font-size:80px;
  color:rgba(255,255,255,.9);z-index:1;letter-spacing:-.02em;
  text-shadow:0 2px 24px rgba(0,0,0,.4)}
.avatar .role{position:absolute;left:10px;bottom:10px;z-index:2;
  font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);
  background:rgba(0,0,0,.35);padding:5px 8px;border-radius:6px;backdrop-filter:blur(6px)}
.person h4{margin:12px 0 2px;font-size:15px;font-weight:600;letter-spacing:-.01em}
.person p{margin:0;font-size:12.5px;color:rgba(255,255,255,.55);line-height:1.45}
.duo-rule{height:1px;background:rgba(255,255,255,.08);margin:22px 0}
.duo-quote{font-family:"Instrument Serif",serif;font-style:italic;font-size:20px;line-height:1.35;
  color:rgba(255,255,255,.92);letter-spacing:-.01em}
.duo-quote sup{font-style:normal;font-family:"Inter Tight",sans-serif;font-size:10px;
  color:rgba(255,255,255,.5);vertical-align:super;margin-right:4px}
.duo-foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;
  font-size:11.5px;color:rgba(255,255,255,.5);letter-spacing:.04em}
.duo-foot .seal{display:inline-flex;align-items:center;gap:8px;color:var(--ochre-soft)}
.seal-dot{width:6px;height:6px;border-radius:50%;background:var(--ochre)}

/* Tape */
.tape{border-block:1px solid var(--line);background:var(--bone);overflow:hidden;margin-top:60px}
.tape-track{display:flex;gap:64px;padding:18px 0;white-space:nowrap;
  animation:tape 38s linear infinite;font-size:13px;color:var(--ink-3);letter-spacing:.04em}
.tape-track span{display:inline-flex;align-items:center;gap:14px}
.tape-track i{font-style:normal;color:var(--ochre-deep);font-family:"Instrument Serif",serif;font-size:18px;line-height:1}
@keyframes tape{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* Why */
.why{padding:clamp(80px,11vw,160px) 0;position:relative}
.section-head{display:grid;grid-template-columns:auto 1fr;gap:clamp(40px,8vw,120px);align-items:end;margin-bottom:64px}
.section-head h2{font-family:"Instrument Serif",serif;font-weight:400;
  font-size:clamp(34px,4.4vw,68px);line-height:1;letter-spacing:-.02em;margin:14px 0 0;max-width:14ch}
.section-head h2 .it{font-style:italic;color:var(--ink-3)}
.section-head .lede{font-size:15px;color:var(--ink-3);max-width:42ch;line-height:1.55}
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.why-col{padding:40px clamp(20px,3vw,40px) 40px 0;display:flex;flex-direction:column;gap:18px;position:relative}
.why-col+.why-col{padding-left:clamp(20px,3vw,40px);border-left:1px solid var(--line)}
.why-num{font-family:"Instrument Serif",serif;font-style:italic;font-size:64px;line-height:1;color:var(--ochre-deep)}
.why-col h3{font-size:24px;font-weight:500;letter-spacing:-.015em;margin:0;line-height:1.15}
.why-col p{margin:0;color:var(--ink-3);font-size:15px;line-height:1.6;max-width:42ch}
.why-col ul{list-style:none;padding:0;margin:auto 0 0;display:flex;flex-direction:column;gap:10px}
.why-col li{display:flex;gap:10px;align-items:baseline;font-size:13.5px;color:var(--ink-3);
  padding-top:10px;border-top:1px dashed var(--line)}
.why-col li::before{content:"";width:6px;height:6px;border-radius:1px;background:var(--ochre);
  display:inline-block;flex:none;transform:translateY(-2px) rotate(45deg)}
.why-eq{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:center;gap:22px;
  padding:36px 0 8px;font-family:"Instrument Serif",serif;font-style:italic;
  font-size:clamp(28px,4vw,52px);color:var(--ink);line-height:1}
.why-eq span:nth-child(even){color:var(--ochre-deep);font-style:normal;font-family:"Inter Tight",sans-serif;font-weight:300}
.why-eq em{font-style:italic;color:var(--ink)}

/* Showcase */
.showcase{padding:clamp(40px,8vw,120px) 0 clamp(80px,11vw,140px);background:var(--bone)}
.show-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(16px,2vw,28px);margin-top:48px}
.show-card{position:relative;border-radius:14px;overflow:hidden;background:var(--ink);
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 18px 40px -24px rgba(0,0,0,.35);
  transition:transform .5s var(--ease-out),box-shadow .5s var(--ease-out)}
.show-card:hover{transform:translateY(-4px);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 26px 50px -22px rgba(0,0,0,.5)}
.show-frame{position:relative;aspect-ratio:4/5;overflow:hidden;background:#0a0a09;cursor:default}
.show-chrome{position:absolute;left:0;right:0;top:0;height:30px;display:flex;align-items:center;
  gap:6px;padding:0 12px;background:linear-gradient(180deg,#1a1915 0,#121110 100%);
  border-bottom:1px solid rgba(255,255,255,.05);z-index:3}
.show-chrome i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.18)}
.show-chrome .url{flex:1;text-align:center;font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.04em;font-family:ui-monospace,Menlo,monospace}
.show-vp{position:absolute;left:0;right:0;top:30px;bottom:0;overflow:hidden;background:#000}
.show-vp img{width:100%;display:block;will-change:transform;
  transition:transform 14s linear;transform:translateY(0)}
.show-card:hover .show-vp img,
.show-card:focus-within .show-vp img{transform:translateY(calc(-100% + (100% * var(--vp-h,0))))}
.show-vp::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,transparent 65%,rgba(0,0,0,.5) 100%);
  opacity:0;transition:opacity .3s}
.show-card:hover .show-vp::after{opacity:1}
.show-meta{padding:16px 16px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px;
  background:#0E0E0C;color:var(--bone)}
.show-meta h4{margin:0;font-size:16px;font-weight:500;letter-spacing:-.01em}
.show-meta p{margin:4px 0 0;font-size:12px;color:rgba(255,255,255,.55)}
.show-tag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.45);
  border:1px solid rgba(255,255,255,.18);padding:5px 8px;border-radius:999px;flex:none;white-space:nowrap}
.show-num{position:absolute;left:14px;top:42px;z-index:4;color:rgba(255,255,255,.6);
  font-family:ui-monospace,Menlo,monospace;font-size:10.5px;letter-spacing:.06em;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);padding:4px 8px;border-radius:6px}
.show-hint{position:absolute;right:14px;top:42px;z-index:4;color:rgba(255,255,255,.7);
  font-size:10.5px;letter-spacing:.04em;display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);padding:4px 8px;border-radius:6px;
  opacity:1;transition:opacity .25s}
.show-card:hover .show-hint{opacity:0}
.show-hint .arr{display:inline-block;animation:bob 1.6s var(--ease) infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(2px)}}
.show-foot{display:flex;align-items:center;justify-content:space-between;margin-top:36px;font-size:13px;color:var(--mute)}
.show-foot a{display:inline-flex;gap:8px;align-items:center;color:var(--ink)}
.show-foot a:hover{color:var(--ochre-deep)}

/* Process */
.process{padding:clamp(80px,11vw,140px) 0;background:var(--ink);color:var(--bone);position:relative;overflow:hidden}
.process::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(60% 50% at 80% 0%,color-mix(in oklab,var(--ochre) 18%,transparent),transparent 60%)}
.process .section-head h2{color:var(--bone)}
.process .section-head h2 .it{color:rgba(255,255,255,.5)}
.process .section-head .lede{color:rgba(255,255,255,.6)}
.process .kicker{color:rgba(255,255,255,.55)}
.proc-list{display:grid;grid-template-columns:1fr;gap:0;border-top:1px solid rgba(255,255,255,.08)}
.proc-row{display:grid;grid-template-columns:80px 1.2fr 2fr 0.9fr;gap:32px;padding:32px 0;
  border-bottom:1px solid rgba(255,255,255,.08);align-items:start;position:relative;
  transition:background .3s,padding-inline .3s}
.proc-row:hover{background:linear-gradient(90deg,rgba(255,255,255,.02),transparent 60%)}
.proc-no{font-family:"Instrument Serif",serif;font-style:italic;color:var(--ochre);font-size:36px;line-height:1}
.proc-row h3{margin:0;font-size:22px;font-weight:500;letter-spacing:-.015em;color:var(--bone)}
.proc-row h3 small{display:block;font-family:"Instrument Serif",serif;font-style:italic;color:rgba(255,255,255,.5);font-size:14px;font-weight:400;margin-top:4px;letter-spacing:0}
.proc-row p{margin:0;color:rgba(255,255,255,.65);font-size:14px;line-height:1.6;max-width:48ch}
.proc-row .dur{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;letter-spacing:.06em;color:rgba(255,255,255,.5);text-align:right}
.proc-row .dur b{display:block;color:var(--ochre-soft);font-weight:400;font-size:13px;letter-spacing:.04em;margin-bottom:4px}

/* CTA */
.cta{padding:clamp(80px,11vw,140px) 0;background:var(--bone)}
.cta-card{position:relative;border:1px solid var(--line-2);border-radius:22px;padding:clamp(36px,6vw,72px);
  background:linear-gradient(180deg,var(--bone) 0%,color-mix(in oklab,var(--bone) 80%,var(--bone-2)) 100%);
  overflow:hidden}
.cta-card::before{content:"";position:absolute;right:-180px;top:-220px;width:520px;height:520px;border-radius:50%;
  background:radial-gradient(circle,color-mix(in oklab,var(--ochre) 35%,transparent) 0%,transparent 60%);
  filter:blur(40px);pointer-events:none}
.cta-grid{display:grid;grid-template-columns:1.4fr .9fr;gap:clamp(28px,5vw,80px);align-items:end;position:relative;z-index:1}
.cta h2{font-family:"Instrument Serif",serif;font-weight:400;

  0%{transform:scale(1);opacity:.7}
  70%{transform:scale(1.18);opacity:0}
  100%{transform:scale(1.18);opacity:0}}

@media(hover:hover){
  body{cursor:none}
  a,button{cursor:none}
}
.cursor-dot{position:fixed;top:0;left:0;width:7px;height:7px;border-radius:50%;
  background:var(--ink);pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);mix-blend-mode:difference;
  transition:width .2s var(--ease),height .2s var(--ease),opacity .3s}
.cursor-ring{position:fixed;top:0;left:0;width:30px;height:30px;border-radius:50%;
  border:1.5px solid rgba(14,14,12,.35);pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);transition:opacity .3s}
.cursor-dot.hidden,.cursor-ring.hidden{opacity:0}
@media(hover:none){.cursor-dot,.cursor-ring{display:none}}

// ── Reveal ────────────────────────────────────────────────────────────────
function initReveal() {
  if (ioRef) ioRef.disconnect();
  ioRef = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) {
        e.target.classList.add('in');
        ioRef.unobserve(e.target);
      }
    });
  }, { rootMargin:'0px 0px -8% 0px', threshold:0.08 });

  var els = document.querySelectorAll('.reveal');
  els.forEach(function(el, i){
    if (revealedSet.has(i)) {
      el.classList.add('in');
    } else {
      ioRef.observe(el);
    }
  });
}

function snapshotRevealed() {
  revealedSet.clear();
  document.querySelectorAll('.reveal').forEach(function(el, i){
    if (el.classList.contains('in')) revealedSet.add(i);
  });
}

// ── Show-card scroll ratio ────────────────────────────────────────────────
var roRefs = [];

function initShowCards() {
  roRefs.forEach(function(ro){ ro.disconnect(); });
  roRefs = [];

  document.querySelectorAll('.show-card').forEach(function(card){
    var img = card.querySelector('img');
    if (!img) return;

    function update() {
      var frame = card.querySelector('.show-vp');
      if (!frame || !img.naturalWidth) return;
      var renderedH = img.getBoundingClientRect().height
        || (img.naturalHeight * (frame.clientWidth / img.naturalWidth));
      var ratio = frame.clientHeight / renderedH;
      card.style.setProperty('--vp-h', ratio.toFixed(4));
    }

    if (img.complete && img.naturalWidth) { update(); }
    else { img.addEventListener('load', update); }

    var ro = new ResizeObserver(update);
    ro.observe(card);
    roRefs.push(ro);
  });
}

// ── Lang switch ───────────────────────────────────────────────────────────
function setLang(l) {
  if (l === lang) return;
  snapshotRevealed();
  lang = l;
  try { localStorage.setItem('namax_lang', l); } catch(e){}
  document.documentElement.lang = l;
  document.title = DICT[l].title;
  render();
}

  if (langBtn) { setLang(langBtn.dataset.lang); return; }

  // open modal
  var modalTrigger = e.target.closest('[data-modal]');
  if (modalTrigger) { e.preventDefault(); openModal(modalTrigger.dataset.modal); return; }

  // close modal via button or backdrop click
  if (e.target.closest('[data-close]')) { closeAllModals(); return; }
  var backdrop = e.target.closest('.modal-backdrop');
  if (backdrop && e.target === backdrop) { closeAllModals(); return; }
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('root').innerHTML = buildPage();
  initReveal();
  initShowCards();
}

// ── Contact form ──────────────────────────────────────────────────────────
document.addEventListener('submit', function(e) {
  var form = e.target.closest('#contact-form');
  if (!form) return;
  e.preventDefault();
  var btn = form.querySelector('.form-submit');
  btn.disabled = true;
  btn.innerHTML = (lang === 'de' ? 'Wird gesendet…' : 'Sending…');
  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(function(r){
    if (r.ok) {
      form.hidden = true;
      var ok = document.getElementById('form-success');
      if (ok) ok.hidden = false;
    } else {
      btn.disabled = false;
      btn.innerHTML = (lang === 'de' ? 'Anfrage absenden' : 'Send enquiry');
    }
  }).catch(function(){
    btn.disabled = false;
    btn.innerHTML = (lang === 'de' ? 'Anfrage absenden' : 'Send enquiry');
  });
});

// ── Parallax ──────────────────────────────────────────────────────────────
function initParallax() {
  window.addEventListener('scroll', function(){
    var hero = document.querySelector('.hero');
    if (!hero) return;
    var y = window.scrollY;
    if (y > hero.offsetHeight) return;
    var grid = hero.querySelector('.hero-grid');
    if (grid) grid.style.transform = 'translateY(' + (y * 0.06) + 'px)';
  }, { passive: true });
}

// ── Cursor ────────────────────────────────────────────────────────────────
function initCursor() {
  var dot  = document.getElementById('cursor-dot');
  var ring = document.getElementById('cursor-ring');
  if (!dot || !ring) return;
  if (!window.matchMedia('(hover:hover)').matches) return;

  var mx = -100, my = -100, rx = -100, ry = -100;

  document.addEventListener('mousemove', function(e){
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top  = my + 'px';
  });

  document.addEventListener('mouseleave', function(){ dot.classList.add('hidden'); ring.classList.add('hidden'); });
  document.addEventListener('mouseenter', function(){ dot.classList.remove('hidden'); ring.classList.remove('hidden'); });

  (function raf(){
    rx += (mx - rx) * 0.10;
    ry += (my - ry) * 0.10;
    ring.style.left = rx + 'px';
    ring.style.top  = ry + 'px';
    requestAnimationFrame(raf);
  })();
}

// ── Boot ──────────────────────────────────────────────────────────────────
lang = getLang();
document.documentElement.lang = lang;
document.title = DICT[lang].title;
document.getElementById('root').innerHTML = buildPage();
document.addEventListener('click', handleClick);
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeAllModals(); });
initReveal();
initShowCards();
initParallax();
initCursor();

})();
</script>
